server {
    listen 80;
    server_name localhost;
    
    # 정적 파일 루트
    root /usr/share/nginx/html;
    index index.html;
    
    # CORS 및 Firebase 팝업을 위한 헤더 설정
    add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
    add_header Cross-Origin-Embedder-Policy "unsafe-none" always;
    
    # Security Headers - Firebase Auth에 필요한 모든 도메인 허용
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://apis.google.com https://www.gstatic.com https://accounts.google.com https://*.firebaseapp.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: blob:; font-src 'self' data:; connect-src 'self' https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://*.firebaseio.com https://*.googleapis.com https://firebase.googleapis.com https://accounts.google.com wss://*.firebaseio.com; frame-src 'self' https://accounts.google.com https://*.firebaseapp.com;" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    # public 폴더 정적 파일 (manifest.json, sw.js, icons)
    location ~* ^/(manifest\.json|sw\.js|icon-\d+x\d+\.png)$ {
        root /usr/share/nginx/html/public;
        try_files $uri =404;
    }
    
    # 캐시 방지 (개발 환경)
    location ~* \.(html|js|css)$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
        add_header Cross-Origin-Embedder-Policy "unsafe-none" always;
        expires off;
    }
    
    # 기타 정적 파일 (이미지, 폰트 등)
    location ~* \.(jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
    # API Proxy
    location /api {
        proxy_pass http://api-server:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Assets Proxy
    location ^~ /assets {
        proxy_pass http://api-server:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Direct Asset Access (Mimic S3 Structure)
    location /base {
        root /usr/share/nginx/html/pokehabit-assets;
    }
    location /custom {
        root /usr/share/nginx/html/pokehabit-assets;
    }
    location /external {
        root /usr/share/nginx/html/pokehabit-assets;
    }
}
