name: Production Deployment

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Action to perform"
        required: true
        default: "apply"
        type: choice
        options:
          - apply
      skip_approval:
        description: "Skip manual approval (NOT RECOMMENDED)"
        required: false
        default: false
        type: boolean

      seed_data:
        description: "Seed database with initial data (Pokemon, Holidays)"
        required: false
        default: false
        type: boolean

  workflow_run:
    workflows: ["CI - Continuous Integration"]
    types:
      - completed
    branches:
      - main

permissions:
  contents: write
  id-token: write
  actions: read
  statuses: write
  deployments: write

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ENVIRONMENT_NAME: prod
  NODE_VERSION: ${{ vars.NODE_VERSION }}
  TERRAFORM_VERSION: ${{ vars.TERRAFORM_VERSION }}
  TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
  TF_RELEASES_BUCKET: poff-infra-releases
  TF_WORKING_DIR: terraform/environments/prod
  TF_STATE_KEY: environments/prod/terraform.tfstate
  TF_VAR_datadog_api_key: ${{ secrets.DATADOG_API_KEY }}
  TF_VAR_datadog_app_key: ${{ secrets.DATADOG_APP_KEY }}
  TF_VAR_lambda_package_dir: "../../../lambda/packages"
  TF_VAR_aws_infra_role_arn: ${{ secrets.AWS_INFRA_DNS_MANAGEMENT_ROLE_ARN }}
  TF_VAR_firebase_service_account: ${{ secrets.PROD_FIREBASE_SERVICE_ACCOUNT }}
  TF_VAR_firebase_api_key: ${{ secrets.VITE_PROD_FIREBASE_API_KEY }}
  TF_VAR_firebase_auth_domain: ${{ secrets.VITE_PROD_FIREBASE_AUTH_DOMAIN }}
  TF_VAR_firebase_project_id: ${{ secrets.VITE_PROD_FIREBASE_PROJECT_ID }}
  TF_VAR_firebase_messaging_sender_id: ${{ secrets.VITE_PROD_FIREBASE_MESSAGING_SENDER_ID }}
  TF_VAR_firebase_app_id: ${{ secrets.VITE_PROD_FIREBASE_APP_ID }}

jobs:
  pre-deployment-checks:
    name: Pre-Deployment Validation
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    outputs:
      can_proceed: ${{ steps.validate.outputs.can_proceed }}
      deploy_version: ${{ steps.version.outputs.version }}
      previous_tag: ${{ steps.version.outputs.previous_tag }}
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate branch
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'push' || github.event_name == 'workflow_run'
        run: |
          BRANCH_NAME="${{ github.ref_name }}"
          if [ "$BRANCH_NAME" != "main" ]; then
            echo "## ❌ Wrong Branch Selected" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**deploy-production.yml** can only be run from the `main` branch." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "- Current branch: `$BRANCH_NAME`" >> $GITHUB_STEP_SUMMARY
            echo "- Required branch: `main`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Please select **main** from the branch dropdown and try again." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          echo "✅ Branch validation passed: $BRANCH_NAME"

      - name: Check for breaking changes
        id: breaking_changes
        run: |
          echo "Checking for breaking changes in commits..."
          
          # Check commit messages for BREAKING CHANGE
          if git log --format=%B origin/main..HEAD | grep -i "BREAKING CHANGE"; then
            echo "has_breaking_changes=true" >> $GITHUB_OUTPUT
            echo "⚠️ Breaking changes detected!"
          else
            echo "has_breaking_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Determine Deployment Version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="v$(date +%Y.%m.%d)-${{ github.run_number }}"
          fi
          
          # Get previous tag for rollback
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "previous_tag=$PREVIOUS_TAG" >> $GITHUB_OUTPUT
          
          echo "Deployment Version: $VERSION"
          echo "Previous Version: $PREVIOUS_TAG"

      - name: Validate prerequisites
        id: validate
        run: |
          TESTS_PASSED="true"
          
          if [ "$TESTS_PASSED" = "true" ]; then
            echo "✅ All pre-deployment checks passed"
            echo "can_proceed=true" >> $GITHUB_OUTPUT
          else
            echo "❌ Pre-deployment checks failed"
            echo "can_proceed=false" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Create deployment notification
        uses: actions/github-script@v8
        with:
          script: |
            const hasBreakingChanges = '${{ steps.breaking_changes.outputs.has_breaking_changes }}' === 'true';
            
            let body = '## 🚀 Production Deployment Initiated\n\n';
            body += '### Pre-Deployment Checks\n';
            body += '- ✅ All tests passed\n';
            
            if (hasBreakingChanges) {
              body += '- ⚠️ **BREAKING CHANGES DETECTED**\n\n';
              body += '**Warning:** This deployment contains breaking changes. Please ensure:\n';
              body += '- API version is updated\n';
              body += '- Migration plan is reviewed\n';
              body += '- Rollback plan is ready\n';
            }
            
            body += `\n**Commit:** ${context.sha}\n`;
            body += `**Triggered by:** @${context.actor}\n`;
            
            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: body
            });

  # Production deployment
  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: [pre-deployment-checks]
    if: |
      always() &&
      needs.pre-deployment-checks.outputs.can_proceed == 'true'
    outputs:
      vpc_id: ${{ steps.set-outputs.outputs.vpc_id }}
      rds_endpoint: ${{ steps.set-outputs.outputs.rds_endpoint }}
      rds_port: ${{ steps.set-outputs.outputs.rds_port }}
      database_name: ${{ steps.set-outputs.outputs.database_name }}
      api_endpoint: ${{ steps.set-outputs.outputs.api_endpoint }}
      cloudfront_url: ${{ steps.set-outputs.outputs.cloudfront_url }}
      s3_bucket: ${{ steps.set-outputs.outputs.s3_bucket }}
      nat_instance_id: ${{ steps.set-outputs.outputs.nat_instance_id }}
      cloudfront_distribution_id: ${{ steps.set-outputs.outputs.cloudfront_distribution_id }}
      infra_duration: ${{ steps.apply.outputs.infra_duration }}
      deployment_time: ${{ steps.deployment-info.outputs.deployment_time }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set action variable
        id: set-action
        run: |
          if [ "${{ github.event_name }}" = "workflow_call" ]; then
            ACTION="${{ inputs.action }}"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ACTION="${{ github.event.inputs.action }}"
          else
            # Default for push event
            ACTION="apply"
          fi
          echo "action=${ACTION:-apply}" >> $GITHUB_OUTPUT

      - name: Record deployment start time
        id: deployment-info
        run: |
          echo "deployment_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_PROD_GHA_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-production
          role-skip-session-tagging: true

      - name: Assume execution role
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_PROD_EXECUTION_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-production-exec
          role-chaining: true
          role-skip-session-tagging: true

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Download Frontend Artifact
        uses: dawidd6/action-download-artifact@v11
        with:
          workflow: ci.yml
          name: frontend-dist
          commit: ${{ github.sha }}
          path: dist

      - name: Download Lambda Artifact
        uses: dawidd6/action-download-artifact@v11
        with:
          workflow: ci.yml
          name: lambda-packages
          commit: ${{ github.sha }}
          path: lambda/packages

      - name: Terraform Init
        id: terraform_init
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_LOG: ERROR
          TF_IN_AUTOMATION: true
          BACKEND_ROLE_ARN: ${{ secrets.AWS_INFRA_CROSS_ACCOUNT_BACKEND_ROLE_ARN }}
        run: |
          set -e
          echo "::group::Terraform Init"
          cat > backend-ci.hcl << EOF
          bucket = "${{ env.TF_STATE_BUCKET }}"
          key = "${{ env.TF_STATE_KEY }}"
          region = "${{ env.AWS_REGION }}"
          encrypt = true
          assume_role = {
            role_arn = "${BACKEND_ROLE_ARN}"
          }
          EOF
          cleanup() {
            rm -f backend-ci.hcl
          }
          trap cleanup EXIT
          terraform init -backend-config=backend-ci.hcl -input=false
          echo "::endgroup::"

      - name: Terraform Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          echo "::group::Terraform Validate"
          terraform validate
          echo "::endgroup::"

      # Apply workflow with extra caution
      - name: Terraform Plan
        id: plan
        if: steps.set-action.outputs.action == 'apply'
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_LOG: ERROR
        run: |
          set -e
          echo "::group::Terraform Plan"
          terraform plan \
            -out=tfplan \
            -detailed-exitcode || exit_code=$?

          if [ "${exit_code:-0}" -eq 0 ]; then
            echo "plan_has_changes=false" >> $GITHUB_OUTPUT
            echo "✅ No infrastructure changes needed"
          elif [ "${exit_code:-0}" -eq 2 ]; then
            echo "plan_has_changes=true" >> $GITHUB_OUTPUT
            echo "⚠️ Infrastructure changes detected - review carefully"
          else
            exit ${exit_code:-1}
          fi
          echo "::endgroup::"

      - name: Terraform Apply
        id: apply
        if: steps.set-action.outputs.action == 'apply' && steps.plan.outcome == 'success'
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_LOG: ERROR
        run: |
          set -e
          echo "::group::Terraform Apply"
          START_TIME=$(date +%s)
          if [ "${{ steps.plan.outputs.plan_has_changes }}" = "true" ]; then
            echo "🚀 Applying infrastructure changes to production..."
            terraform apply -auto-approve tfplan
            echo "apply_success=true" >> $GITHUB_OUTPUT
            echo "✅ Infrastructure changes applied successfully"
          else
            echo "No changes to apply"
            echo "apply_success=true" >> $GITHUB_OUTPUT
          fi
          END_TIME=$(date +%s)
          echo "infra_duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT
          echo "::endgroup::"



      - name: Install jq
        if: steps.set-action.outputs.action == 'apply'
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Set Terraform Outputs
        id: set-outputs
        if: steps.set-action.outputs.action == 'apply' && steps.apply.outcome == 'success' && steps.apply.outputs.apply_success == 'true'
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          set -e
          outputs_json=$(terraform output -json)

          # Essential outputs only
          outputs_to_set=(
            "vpc_id"
            "rds_endpoint"
            "rds_port"
            "database_name"
            "api_endpoint"
            "cloudfront_url"
            "s3_bucket"
            "nat_instance_id"
            "cloudfront_distribution_id"
          )

          for output in "${outputs_to_set[@]}"; do
            if echo "$outputs_json" | jq -e --arg key "$output" 'has($key)' > /dev/null; then
              value=$(echo "$outputs_json" | jq -r --arg key "$output" '.[$key].value')
              echo "${output}=${value}" >> $GITHUB_OUTPUT
            else
              echo "${output}=" >> $GITHUB_OUTPUT
            fi
          done

      - name: Store Parameters in SSM
        if: steps.set-action.outputs.action == 'apply' && steps.apply.outcome == 'success'
        run: |
          ENV="prod"
          echo "Storing infrastructure parameters in SSM for environment: $ENV"
          
          aws ssm put-parameter --name "/poff/$ENV/infrastructure/rds_endpoint" --value "${{ steps.set-outputs.outputs.rds_endpoint }}" --type "String" --overwrite
          aws ssm put-parameter --name "/poff/$ENV/infrastructure/rds_port" --value "${{ steps.set-outputs.outputs.rds_port }}" --type "String" --overwrite
          aws ssm put-parameter --name "/poff/$ENV/infrastructure/database_name" --value "${{ steps.set-outputs.outputs.database_name }}" --type "String" --overwrite
          aws ssm put-parameter --name "/poff/$ENV/infrastructure/nat_instance_id" --value "${{ steps.set-outputs.outputs.nat_instance_id }}" --type "String" --overwrite
          aws ssm put-parameter --name "/poff/$ENV/infrastructure/s3_bucket" --value "${{ steps.set-outputs.outputs.s3_bucket }}" --type "String" --overwrite
          
          echo "✅ Parameters stored successfully"

      # Artifacts (Frontend and Lambda) are already downloaded in previous steps

      - name: Archive Artifacts to S3
        if: steps.set-action.outputs.action == 'apply'
        run: |
          VERSION="${{ needs.pre-deployment-checks.outputs.deploy_version }}"
          RELEASES_BUCKET="${{ env.TF_RELEASES_BUCKET }}"
          
          echo "Archiving artifacts for version $VERSION to s3://${RELEASES_BUCKET}/releases/${VERSION}/..."
          
          # Upload Frontend (Runs directly with the assumed Prod execution role credentials)
          aws s3 sync dist/ "s3://${RELEASES_BUCKET}/releases/${VERSION}/frontend/" --delete
          
          # Upload Lambda (Runs directly with the assumed Prod execution role credentials)
          aws s3 sync lambda/packages/ "s3://${RELEASES_BUCKET}/releases/${VERSION}/lambda/" --delete
          
          echo "✅ Artifacts archived successfully"

      # Upload static files to S3
      - name: Upload Frontend Files to S3
        if: steps.set-action.outputs.action == 'apply' && steps.apply.outcome == 'success'
        run: |
          echo "Uploading Vite build output to S3..."
          S3_BUCKET="${{ steps.set-outputs.outputs.s3_bucket }}"
          
          if [ -z "$S3_BUCKET" ]; then
            echo "Error: S3 bucket name not found"
            exit 1
          fi
          
          echo "Target bucket: $S3_BUCKET"
          
          # Upload all files from dist/ directory (Vite build output)
          echo "Uploading dist/ files..."
          
          # Sync dist/ to S3 with appropriate cache headers
          # - HTML files: short cache (5 min) for quick updates
          # - Assets with hash: long cache (1 year) for optimal performance
          # - Other static files: medium cache (1 hour)
          
          # Upload HTML file with no-cache (ensure users always get the latest version)
          aws s3 cp dist/index.html "s3://${S3_BUCKET}/" \
            --content-type "text/html" \
            --cache-control "no-cache"
          
          # Upload hashed assets (JS, CSS) with long cache
          if [ -d "dist/assets" ]; then
            aws s3 sync dist/assets/ "s3://${S3_BUCKET}/assets/" \
              --cache-control "max-age=31536000, immutable" \
              --exclude "*.DS_Store"
          fi
          
          # Upload PWA files (manifest, service worker, icons)
          echo "Uploading PWA files..."
          for file in dist/manifest.json dist/sw.js; do
            if [ -f "$file" ]; then
              filename=$(basename "$file")
              aws s3 cp "$file" "s3://${S3_BUCKET}/${filename}" \
                --cache-control "no-cache"
            fi
          done
          
          # Upload PWA icons
          for icon in dist/icon-*.png dist/apple-touch-icon.png; do
            if [ -f "$icon" ]; then
              filename=$(basename "$icon")
              aws s3 cp "$icon" "s3://${S3_BUCKET}/${filename}" \
                --cache-control "max-age=31536000"
            fi
          done
          
          # Upload fonts if they exist in dist
          if [ -d "dist/fonts" ]; then
            echo "Uploading fonts..."
            aws s3 sync dist/fonts/ "s3://${S3_BUCKET}/fonts/" \
              --cache-control "max-age=31536000" \
              --exclude "*.DS_Store"
          fi
          
          # Note: poff-assets are uploaded separately via scripts/upload-assets.sh
          # This avoids storing large binary files in Git
          
          echo "✅ Frontend files uploaded successfully"

      - name: Invalidate CloudFront Cache
        if: steps.set-action.outputs.action == 'apply' && steps.apply.outcome == 'success'
        run: |
          DIST_ID="${{ steps.set-outputs.outputs.cloudfront_distribution_id }}"
          if [ ! -z "$DIST_ID" ]; then
            echo "Invalidating CloudFront cache for distribution: $DIST_ID"
            aws cloudfront create-invalidation --distribution-id "$DIST_ID" --paths "/*"
          else
            echo "CloudFront distribution ID not found, skipping invalidation"
          fi

      - name: Cleanup
        if: always()
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          if [ -f "tfplan" ]; then
            rm -f "tfplan"
          fi

  # Database Migration with backup
  run-migration:
    name: Run Production Migration
    needs: [deploy-production]
    if: needs.deploy-production.outputs.rds_endpoint != ''
    uses: ./.github/workflows/db-migration.yml
    with:
      environment: 'prod'
      migration_action: 'up'
      skip_notifications: true
    secrets: inherit

  seed-database:
    name: Seed Database
    needs: [deploy-production, run-migration]
    if: needs.deploy-production.outputs.rds_endpoint != '' && (github.event_name == 'workflow_dispatch' && github.event.inputs.seed_data == 'true')
    uses: ./.github/workflows/seed-rds.yml
    with:
      environment: 'prod'
      seed_holidays: true
      rds_endpoint: ${{ needs.deploy-production.outputs.rds_endpoint }}
      rds_port: ${{ needs.deploy-production.outputs.rds_port }}
      database_name: ${{ needs.deploy-production.outputs.database_name }}
      nat_instance_id: ${{ needs.deploy-production.outputs.nat_instance_id }}
      assets_bucket_name: "poff-prod-assets"
    secrets: inherit

  # Production smoke tests
  smoke-tests:
    name: Production Smoke Tests
    needs: [deploy-production, run-migration, seed-database]
    if: |
      always() &&
      needs.deploy-production.result == 'success' && 
      needs.deploy-production.outputs.api_endpoint != '' &&
      (needs.run-migration.result == 'success' || needs.run-migration.result == 'skipped') &&
      (needs.seed-database.result == 'success' || needs.seed-database.result == 'skipped')
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Smoke Tests
        env:
          API_URL: ${{ needs.deploy-production.outputs.api_endpoint }}
        run: |
          if [ -z "$API_URL" ]; then
            echo "❌ Error: API_URL environment variable is missing"
            exit 1
          fi

          echo "Testing API at: $API_URL"
          
          # Health check & Smoke Test using the unified script
          node scripts/smoke-test.js

      - name: Verify database connectivity
        run: |
          echo "Verifying production database connectivity..."
          # Add database connectivity checks

  # Auto Rollback on Failure
  auto-rollback:
    name: Auto Rollback
    needs: [smoke-tests, pre-deployment-checks]
    if: failure() && needs.smoke-tests.result == 'failure' && needs.pre-deployment-checks.outputs.previous_tag != ''
    uses: ./.github/workflows/rollback-production.yml
    with:
      rollback_type: 'full'
      target_tag: ${{ needs.pre-deployment-checks.outputs.previous_tag }}
      reason: '🚨 Automatic Rollback: E2E Tests Failed immediately after deployment.'
      rollback_migration: false
    secrets: inherit


  # Post-deployment monitoring
  post-deployment-monitoring:
    name: Post-Deployment Monitoring
    needs: [deploy-production, smoke-tests, run-migration, seed-database]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Monitor deployment for 5 minutes
        run: |
          echo "Monitoring production deployment..."
          echo "Checking for errors and anomalies..."
          
          # Monitor for 5 minutes
          END_TIME=$(($(date +%s) + 300))
          while [ $(date +%s) -lt $END_TIME ]; do
            echo "Monitoring... $(date)"
            # Add CloudWatch metrics check here
            sleep 30
          done
          
          echo "✅ Monitoring period completed - no critical issues detected"

      - name: Check error rates
        run: |
          echo "Checking error rates in production..."
          # Add error rate checking logic

  # Create release tag if deployment successful
  create-release:
    name: Create Release
    needs: [deploy-production, smoke-tests, run-migration, post-deployment-monitoring, seed-database, pre-deployment-checks]
    if: |
      always() &&
      needs.deploy-production.result == 'success' &&
      needs.smoke-tests.result == 'success' &&
      needs.run-migration.result == 'success' &&
      needs.post-deployment-monitoring.result == 'success' &&
      (needs.seed-database.result == 'success' || needs.seed-database.result == 'skipped') &&
      !startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          echo "Generating changelog..."
          
          # Get the last tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          
          if [ -z "$LAST_TAG" ]; then
            # First release
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --reverse)
          else
            # Changes since last tag
            CHANGELOG=$(git log ${LAST_TAG}..HEAD --pretty=format:"- %s (%h)")
          fi
          
          # Save to file
          echo "$CHANGELOG" > changelog.txt
          echo "changelog_file=changelog.txt" >> $GITHUB_OUTPUT

      - name: Create release tag
        run: |
          # Use the version determined in pre-deployment-checks
          VERSION="${{ needs.pre-deployment-checks.outputs.deploy_version }}"
          echo "Creating release tag: $VERSION"
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git tag -a "$VERSION" -m "Production release $VERSION"
          git push origin "$VERSION"
          
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const changelog = fs.readFileSync('${{ steps.changelog.outputs.changelog_file }}', 'utf8');
            
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: process.env.VERSION,
              name: `Release ${process.env.VERSION}`,
              body: `## 🚀 Production Release\n\n**Deployed at:** ${{ needs.deploy-production.outputs.deployment_time }}\n**CloudFront:** ${{ needs.deploy-production.outputs.cloudfront_url }}\n**API:** ${{ needs.deploy-production.outputs.api_endpoint }}\n\n## Changes\n${changelog}`,
              draft: false,
              prerelease: false
            });

  # Notification
  notify:
    name: Notify Deployment Status
    needs: [deploy-production, smoke-tests, run-migration, post-deployment-monitoring, seed-database, pre-deployment-checks]
    if: always()
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Get Time and Duration
        id: time
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Get formatted time (KST)
          echo "time=$(TZ='Asia/Seoul' date '+%d일 %H시 %M분')" >> $GITHUB_OUTPUT
          
          # Calculate workflow duration
          START_TIME=$(gh run view ${{ github.run_id }} --json startedAt,createdAt --jq '.startedAt // .createdAt')
          START_EPOCH=$(date -d "$START_TIME" +%s)
          NOW_EPOCH=$(date +%s)
          DURATION_SEC=$((NOW_EPOCH - START_EPOCH))
          DURATION_MIN=$((DURATION_SEC / 60))
          DURATION_SEC_REMAIN=$((DURATION_SEC % 60))
          echo "duration=${DURATION_MIN}분 ${DURATION_SEC_REMAIN}초" >> $GITHUB_OUTPUT
          echo "duration_seconds=${DURATION_SEC}" >> $GITHUB_OUTPUT

      - name: Send Deployment Metrics to Datadog
        if: always()
        env:
          DATADOG_API_KEY: ${{ secrets.DATADOG_API_KEY }}
          DATADOG_SITE: ${{ secrets.DATADOG_SITE || 'datadoghq.com' }}
        run: |
          # Determine overall deployment status
          if [[ "${{ needs.deploy-production.result }}" == "success" && \
                "${{ needs.smoke-tests.result }}" == "success" && \
                "${{ needs.run-migration.result }}" == "success" && \
                "${{ needs.post-deployment-monitoring.result }}" == "success" && \
                ("${{ needs.seed-database.result }}" == "success" || "${{ needs.seed-database.result }}" == "skipped") ]]; then
            DEPLOYMENT_STATUS="success"
          else
            DEPLOYMENT_STATUS="failure"
          fi
          
          chmod +x scripts/send-deployment-to-datadog.sh
          
          scripts/send-deployment-to-datadog.sh \
            "$DEPLOYMENT_STATUS" \
            "production" \
            "${{ needs.pre-deployment-checks.outputs.deploy_version }}" \
            "${{ steps.time.outputs.duration_seconds }}" \
            "${{ needs.deploy-production.outputs.infra_duration || 0 }}" \
            "${{ github.actor }}" \
            "${{ github.sha }}"

      - name: Notify Slack on Success
        if: |
          needs.deploy-production.result == 'success' &&
          needs.smoke-tests.result == 'success' &&
          needs.run-migration.result == 'success' &&
          needs.post-deployment-monitoring.result == 'success' &&
          (needs.seed-database.result == 'success' || needs.seed-database.result == 'skipped')
        uses: 8398a7/action-slack@v3
        with:
          status: success
          channel: '#poff-deployments'
          text: |
            ✅ *운영 환경 배포 성공!*
            
            버전: ${{ needs.pre-deployment-checks.outputs.deploy_version }}
            🕒 시각: ${{ steps.time.outputs.time }}
            러너 소요 시간: ${{ steps.time.outputs.duration }}
            배포자: @${{ github.actor }}
            
            *배포 정보:*
            CloudFront: ${{ needs.deploy-production.outputs.cloudfront_url }}
            API: ${{ needs.deploy-production.outputs.api_endpoint }}
            시딩: ${{ needs.seed-database.result }}
            
            *완료 상태:*
            인프라 배포 완료
            스모크 테스트 통과
            데이터베이스 마이그레이션 완료
            배포 후 모니터링 완료
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_DEPLOY }}

      - name: Determine Failure Details
        id: failure_details
        if: |
          needs.deploy-production.result == 'failure' ||
          needs.smoke-tests.result == 'failure' ||
          needs.run-migration.result == 'failure' ||
          needs.post-deployment-monitoring.result == 'failure' ||
          needs.seed-database.result == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          FAILED_JOB=""
          FAILED_STEP=""

          if [ "${{ needs.deploy-production.result }}" == "failure" ]; then
            FAILED_JOB="Deploy Production"
            FAILED_STEP=$(gh run view ${{ github.run_id }} --json jobs --jq '.jobs[] | select(.name | contains("Deploy Production")) | .steps[] | select(.conclusion == "failure") | .name' | head -1)
          elif [ "${{ needs.smoke-tests.result }}" == "failure" ]; then
            FAILED_JOB="Production Smoke Tests"
            FAILED_STEP=$(gh run view ${{ github.run_id }} --json jobs --jq '.jobs[] | select(.name | contains("Production Smoke Tests")) | .steps[] | select(.conclusion == "failure") | .name' | head -1)
          elif [ "${{ needs.run-migration.result }}" == "failure" ]; then
            FAILED_JOB="Run Production Migration"
            FAILED_STEP=$(gh run view ${{ github.run_id }} --json jobs --jq '.jobs[] | select(.name | contains("Run Production Migration")) | .steps[] | select(.conclusion == "failure") | .name' | head -1)
          elif [ "${{ needs.seed-database.result }}" == "failure" ]; then
            FAILED_JOB="Seed Database"
            FAILED_STEP=$(gh run view ${{ github.run_id }} --json jobs --jq '.jobs[] | select(.name | contains("Seed Database")) | .steps[] | select(.conclusion == "failure") | .name' | head -1)
          elif [ "${{ needs.post-deployment-monitoring.result }}" == "failure" ]; then
            FAILED_JOB="Post-Deployment Monitoring"
            FAILED_STEP=$(gh run view ${{ github.run_id }} --json jobs --jq '.jobs[] | select(.name | contains("Post-Deployment Monitoring")) | .steps[] | select(.conclusion == "failure") | .name' | head -1)
          else
            FAILED_JOB="Unknown Job"
            FAILED_STEP="Unknown Step"
          fi
          
          echo "failed_job=$FAILED_JOB" >> $GITHUB_OUTPUT
          echo "failed_step=${FAILED_STEP:-알 수 없음}" >> $GITHUB_OUTPUT

          # Helper function for status icons
          get_status_text() {
            if [ "$1" == "failure" ]; then echo "❌ 실패";
            elif [ "$1" == "success" ]; then echo "✅ 성공";
            else echo "⏭️ 건너뜀"; fi
          }

          echo "deploy_status=$(get_status_text ${{ needs.deploy-production.result }})" >> $GITHUB_OUTPUT
          echo "smoke_status=$(get_status_text ${{ needs.smoke-tests.result }})" >> $GITHUB_OUTPUT
          echo "migration_status=$(get_status_text ${{ needs.run-migration.result }})" >> $GITHUB_OUTPUT
          echo "seed_status=$(get_status_text ${{ needs.seed-database.result }})" >> $GITHUB_OUTPUT
          echo "monitor_status=$(get_status_text ${{ needs.post-deployment-monitoring.result }})" >> $GITHUB_OUTPUT

      - name: Notify Slack on Failure
        if: |
          needs.deploy-production.result == 'failure' ||
          needs.smoke-tests.result == 'failure' ||
          needs.run-migration.result == 'failure' ||
          needs.post-deployment-monitoring.result == 'failure' ||
          needs.seed-database.result == 'failure'
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          channel: '#poff-alerts'
          text: |
            🚨 *운영 환경 배포 실패!*
            
            버전: ${{ needs.pre-deployment-checks.outputs.deploy_version }}
            실패한 잡: ${{ steps.failure_details.outputs.failed_job }}
            실패한 스텝: ${{ steps.failure_details.outputs.failed_step }}
            
            🕒 시각: ${{ steps.time.outputs.time }}
            러너 소요 시간: ${{ steps.time.outputs.duration }}
            배포자: @${{ github.actor }}
            
            *상세 상태:*
            인프라: ${{ steps.failure_details.outputs.deploy_status }}
            스모크 테스트: ${{ steps.failure_details.outputs.smoke_status }}
            마이그레이션: ${{ steps.failure_details.outputs.migration_status }}
            시딩: ${{ steps.failure_details.outputs.seed_status }}
            • 모니터링: ${{ steps.failure_details.outputs.monitor_status }}
            
            ⚠️ *조치 필요:* 즉각적인 확인이 필요합니다!
            
            👉 <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|로그 확인하러 가기>
            
            @channel - 운영 배포에 주의가 필요합니다!
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_ALERT }}


