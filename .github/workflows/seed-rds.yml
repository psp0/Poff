name: Seed RDS Database

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod
      seed_pokemon:
        description: 'Seed Pokemon data?'
        required: false
        default: true
        type: boolean
      seed_holidays:
        description: 'Also seed holidays?'
        required: false
        default: false
        type: boolean
  workflow_call:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: string
      seed_pokemon:
        description: 'Seed Pokemon data?'
        required: false
        default: true
        type: boolean
      seed_holidays:
        description: 'Also seed holidays?'
        required: false
        default: false
        type: boolean
      # Infrastructure inputs (optional - if provided, Terraform init is skipped)
      rds_endpoint:
        required: false
        type: string
      rds_port:
        required: false
        type: string
      database_name:
        required: false
        type: string
      nat_instance_id:
        required: false
        type: string
      assets_bucket_name:
        required: false
        type: string

    secrets:
      AWS_DEPLOY_ROLE_ARN:
        required: false
        description: 'AWS Deploy Role ARN'
      AWS_EXECUTION_ROLE_ARN:
        required: false
        description: 'AWS Execution Role ARN'
      AWS_INFRA_CROSS_ACCOUNT_BACKEND_ROLE_ARN:
        required: false
        description: 'AWS Infra Cross Account Backend Role ARN'
      HOLIDAY_API_KEY:
        required: false
        description: 'Holiday API Key'
      SLACK_WEBHOOK_DEPLOY:
        required: false
        description: 'Slack Webhook for Deployments'
      SLACK_WEBHOOK_ALERT:
        required: false
        description: 'Slack Webhook for Alerts'

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  NODE_VERSION: ${{ vars.NODE_VERSION }}
  TERRAFORM_VERSION: ${{ vars.TERRAFORM_VERSION }}

jobs:
  seed-database:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: seeder/package-lock.json
      
      - name: Set environment variables
        id: set-env
        run: |
          ENV="${{ inputs.environment || github.event.inputs.environment }}"
          ENV_UPPER=$(echo "$ENV" | tr '[:lower:]' '[:upper:]')
          echo "environment=$ENV" >> $GITHUB_OUTPUT
          echo "env_upper=$ENV_UPPER" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN || secrets[format('AWS_{0}_GHA_DEPLOY_ROLE_ARN', steps.set-env.outputs.env_upper)] }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-seed-rds
          role-skip-session-tagging: true

      - name: Assume Execution Role
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_EXECUTION_ROLE_ARN || secrets[format('AWS_{0}_EXECUTION_ROLE_ARN', steps.set-env.outputs.env_upper)] }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-execution-role
          role-chaining: true
          role-skip-session-tagging: true

      # Check if infrastructure details were provided as inputs
      - name: Check Input Availability
        id: check-inputs
        run: |
          if [[ -n "${{ inputs.rds_endpoint }}" && -n "${{ inputs.nat_instance_id }}" ]]; then
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "available=false" >> $GITHUB_OUTPUT
          fi

      # Setup Terraform only if we need to fetch infrastructure outputs
      - name: Setup Terraform
        if: steps.check-inputs.outputs.available == 'false'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Get infrastructure outputs (Terraform)
        id: infra-tf
        if: steps.check-inputs.outputs.available == 'false'
        env:
          BACKEND_ROLE_ARN: ${{ secrets.AWS_INFRA_CROSS_ACCOUNT_BACKEND_ROLE_ARN }}
          TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
        run: |
          ENV="${{ steps.set-env.outputs.environment }}"
          cd terraform/environments/$ENV
          
          # Generate backend config for CI
          cat > backend-ci.hcl << EOF
          bucket         = "$TF_STATE_BUCKET"
          key            = "environments/$ENV/terraform.tfstate"
          region         = "$AWS_REGION"
          encrypt        = true
          assume_role = {
            role_arn = "$BACKEND_ROLE_ARN"
          }
          EOF
          
          terraform init -backend-config=backend-ci.hcl -input=false
          
          # Cleanup backend config
          rm -f backend-ci.hcl
          
          # Get NAT instance details, RDS endpoint, and database name
          NAT_INSTANCE_ID=$(terraform output -raw nat_instance_id 2>/dev/null || echo "")
          RDS_ENDPOINT=$(terraform output -raw rds_endpoint)
          DATABASE_NAME=$(terraform output -raw database_name)
          ASSETS_BUCKET_NAME="poff-${ENV}-assets"
          RDS_PORT=$(terraform output -raw rds_port)
          
          echo "nat_instance_id=$NAT_INSTANCE_ID" >> $GITHUB_OUTPUT
          echo "rds_endpoint=$RDS_ENDPOINT" >> $GITHUB_OUTPUT
          echo "rds_port=$RDS_PORT" >> $GITHUB_OUTPUT
          echo "database_name=$DATABASE_NAME" >> $GITHUB_OUTPUT
          echo "assets_bucket_name=$ASSETS_BUCKET_NAME" >> $GITHUB_OUTPUT

      - name: Consolidate Infrastructure Outputs
        id: infra
        run: |
          if [ "${{ steps.check-inputs.outputs.available }}" == "true" ]; then
            echo "Using provided inputs..."
            echo "nat_instance_id=${{ inputs.nat_instance_id }}" >> $GITHUB_OUTPUT
            echo "rds_endpoint=${{ inputs.rds_endpoint }}" >> $GITHUB_OUTPUT
            echo "rds_port=${{ inputs.rds_port }}" >> $GITHUB_OUTPUT
            echo "database_name=${{ inputs.database_name }}" >> $GITHUB_OUTPUT
            echo "assets_bucket_name=${{ inputs.assets_bucket_name }}" >> $GITHUB_OUTPUT
          else
            echo "Using Terraform outputs..."
            echo "nat_instance_id=${{ steps.infra-tf.outputs.nat_instance_id }}" >> $GITHUB_OUTPUT
            echo "rds_endpoint=${{ steps.infra-tf.outputs.rds_endpoint }}" >> $GITHUB_OUTPUT
            echo "rds_port=${{ steps.infra-tf.outputs.rds_port }}" >> $GITHUB_OUTPUT
            echo "database_name=${{ steps.infra-tf.outputs.database_name }}" >> $GITHUB_OUTPUT
            echo "assets_bucket_name=${{ steps.infra-tf.outputs.assets_bucket_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Validate NAT Instance
        run: |
          NAT_INSTANCE_ID="${{ steps.infra.outputs.nat_instance_id }}"
          if [ -z "$NAT_INSTANCE_ID" ]; then
            echo "❌ Error: NAT Instance ID is not available"
            echo "SSM Port Forwarding requires a NAT instance for RDS access"
            exit 1
          fi
          echo "✅ NAT Instance ID: $NAT_INSTANCE_ID"

      - name: Setup SSM Port Forwarding
        uses: ./.github/actions/setup-ssm-tunnel
        with:
          nat-instance-id: ${{ steps.infra.outputs.nat_instance_id }}
          rds-endpoint: ${{ steps.infra.outputs.rds_endpoint }}
          rds-port: ${{ steps.infra.outputs.rds_port }}
      
      - name: Wait for SSM tunnel to establish
        run: sleep 5

      - name: Fetch Database Credentials from SSM
        id: db-creds
        run: |
          ENV="${{ steps.set-env.outputs.environment }}"
          PROJECT_NAME="poff"
          
          USER_PARAM="/${PROJECT_NAME}/${ENV}/database/admin/username"
          PASS_PARAM="/${PROJECT_NAME}/${ENV}/database/admin/password"
          
          echo "Fetching credentials from SSM Parameters..."
          
          # Fetch Username
          if ! DB_USER=$(aws ssm get-parameter --name "$USER_PARAM" --with-decryption --query "Parameter.Value" --output text); then
             echo "::error::Failed to fetch DB username from SSM"
             exit 1
          fi

          # Fetch Password
          if ! DB_PASSWORD=$(aws ssm get-parameter --name "$PASS_PARAM" --with-decryption --query "Parameter.Value" --output text); then
             echo "::error::Failed to fetch DB password from SSM"
             exit 1
          fi
          
          # Set as masked output to prevent exposure in logs
          echo "::add-mask::$DB_USER"
          echo "::add-mask::$DB_PASSWORD"
          echo "db_user=$DB_USER" >> $GITHUB_OUTPUT
          echo "db_password=$DB_PASSWORD" >> $GITHUB_OUTPUT

      - name: Install seeder dependencies
        run: |
          cd seeder
          npm ci

      - name: Run seeder
        if: inputs.seed_pokemon == true || inputs.seed_pokemon == null || github.event.inputs.seed_pokemon == 'true'
        env:
          NODE_ENV: production
          DB_HOST: localhost
          DB_PORT: 3307
          DB_NAME: ${{ steps.infra.outputs.database_name }}
          DB_USER: ${{ steps.db-creds.outputs.db_user }}
          DB_PASSWORD: ${{ steps.db-creds.outputs.db_password }}
          S3_BUCKET_NAME: ${{ steps.infra.outputs.assets_bucket_name }}
          S3_BASE_PATH: ''
        run: |
          cd seeder
          echo "🌱 Seeding Pokemon Data..."
          npm run seed:rds 2>&1 | tee /tmp/step_output.log

      - name: Run Holiday Seeder
        if: inputs.seed_holidays == true || github.event.inputs.seed_holidays == 'true'
        env:
          NODE_ENV: production
          DB_HOST: localhost
          DB_PORT: 3307
          DB_NAME: ${{ steps.infra.outputs.database_name }}
          DB_USER: ${{ steps.db-creds.outputs.db_user }}
          DB_PASSWORD: ${{ steps.db-creds.outputs.db_password }}
          HOLIDAY_API_KEY: ${{ secrets.HOLIDAY_API_KEY }}
        run: |
          cd seeder
          echo "📅 Seeding Holiday Data..."
          npm run seed:holidays:rds 2>&1 | tee /tmp/step_output.log
      
      - name: Cleanup
        if: always()
        run: |
          pkill -f "session-manager-plugin" || true

      - name: Notify on success
        if: success()
        continue-on-error: true
        uses: 8398a7/action-slack@v3
        with:
          status: success
          channel: '#poff-deployments'
          text: |
            ✅ *데이터베이스 시딩 성공!*
            
            환경: ${{ steps.set-env.outputs.environment }}
            커밋: ${{ github.sha }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_DEPLOY }}

      - name: Capture Failure Log
        id: capture-log
        if: failure()
        run: |
          echo "failure_log<<EOF" >> $GITHUB_OUTPUT
          if [ -f /tmp/step_output.log ]; then
            (grep -iC 5 "error" /tmp/step_output.log || tail -n 20 /tmp/step_output.log) | tail -n 20 >> $GITHUB_OUTPUT
          else
            echo "Log file not found" >> $GITHUB_OUTPUT
          fi
      - name: Determine Failure Details
        id: failure_details
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          FAILED_STEP=$(gh run view ${{ github.run_id }} --json jobs --jq '.jobs[] | select(.name | contains("seed-database")) | .steps[] | select(.conclusion == "failure") | .name' | head -1)
          echo "failed_step=${FAILED_STEP:-알 수 없음}" >> $GITHUB_OUTPUT

      - name: Notify on failure
        if: failure()
        continue-on-error: true
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          channel: '#poff-alerts'
          text: |
            🚨 *데이터베이스 시딩 실패!*
            
            환경: ${{ steps.set-env.outputs.environment }}
            커밋: ${{ github.sha }}
            
            *실패 로그 (마지막 20줄):*
            ```
            ${{ steps.capture-log.outputs.failure_log }}
            ```
            
            <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|로그 확인하러 가기>
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_ALERT }}
