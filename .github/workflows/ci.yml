name: CI - Continuous Integration

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '.github/dependabot.yml'
      - 'LICENSE'     
      - '**/*.md'     
      - 'docs/**'             
      - '.gitignore'     
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - '.github/dependabot.yml'
      - 'LICENSE'
      - '**/*.md'
      - 'docs/**'
      - '.gitignore'
  
permissions:
  contents: read
  id-token: write
  actions: read
  statuses: write
  deployments: write
  security-events: write

env:
  NODE_VERSION: ${{ vars.NODE_VERSION }}
  TERRAFORM_VERSION: ${{ vars.TERRAFORM_VERSION }}
  AWS_REGION: ${{ vars.AWS_REGION }}
  TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Build and validate frontend
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          retention-days: 7

  # Validate Terraform configuration (Dev)
  validate-terraform-dev:
    name: Validate Terraform (Dev)
    runs-on: ubuntu-latest
    env:
      TF_WORKING_DIR: terraform/environments/dev
      TF_STATE_KEY: environments/dev/terraform.tfstate
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Configure AWS Credentials
        if: github.actor != 'dependabot[bot]'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEV_GHA_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-ci
          role-skip-session-tagging: true

      - name: Assume Execution Role
        if: github.actor != 'dependabot[bot]'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEV_EXECUTION_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-ci-execution
          role-chaining: true
          role-skip-session-tagging: true

      - name: Terraform Format Check
        run: |
          cd terraform
          terraform fmt -check -recursive modules/
          terraform fmt -check -recursive environments/
          terraform fmt -check -recursive bootstrap/

      - name: Terraform Init and Validate (Dev)
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_LOG: ERROR
          TF_IN_AUTOMATION: true
          BACKEND_ROLE_ARN: ${{ secrets.AWS_INFRA_CROSS_ACCOUNT_BACKEND_ROLE_ARN }}
        run: |
          if [ "${{ github.actor }}" == "dependabot[bot]" ]; then
            echo "Running in Dependabot mode - skipping backend configuration"
            terraform init -backend=false -input=false
          else
            set -e
            echo "::group::Creating temporary backend configuration"
            cat > backend-ci.hcl <<EOF
          bucket  = "${{ env.TF_STATE_BUCKET }}"
          key     = "${{ env.TF_STATE_KEY }}"
          region  = "${{ env.AWS_REGION }}"
          encrypt = true
          assume_role = {
            role_arn = "${BACKEND_ROLE_ARN}"
          }
          EOF
            
            # Cleanup function to remove temporary backend config
            cleanup() {
              rm -f backend-ci.hcl
              echo "Backend configuration file cleaned up"
            }
            trap cleanup EXIT
            echo "::endgroup::"
            
            echo "::group::Terraform Init"
            terraform init -backend-config=backend-ci.hcl -input=false
            echo "Terraform initialization completed successfully"
            echo "::endgroup::"
          fi
          
          echo "::group::Terraform Validate"
          terraform validate
          echo "Terraform validation completed successfully"
          echo "::endgroup::"

  # Validate Terraform configuration (Prod)
  validate-terraform-prod:
    name: Validate Terraform (Prod)
    runs-on: ubuntu-latest
    env:
      TF_WORKING_DIR: terraform/environments/prod
      TF_STATE_KEY: environments/prod/terraform.tfstate
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Configure AWS Credentials
        if: github.actor != 'dependabot[bot]'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_PROD_GHA_CI_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-ci
          role-skip-session-tagging: true



      - name: Terraform Init and Validate (Prod)
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_LOG: ERROR
          TF_IN_AUTOMATION: true
          BACKEND_ROLE_ARN: ${{ secrets.AWS_INFRA_CROSS_ACCOUNT_BACKEND_ROLE_ARN }}
        run: |
          if [ "${{ github.actor }}" == "dependabot[bot]" ]; then
            echo "Running in Dependabot mode - skipping backend configuration"
            terraform init -backend=false -input=false
          else
            set -e
            echo "::group::Creating temporary backend configuration"
            cat > backend-ci.hcl <<EOF
          bucket  = "${{ env.TF_STATE_BUCKET }}"
          key     = "${{ env.TF_STATE_KEY }}"
          region  = "${{ env.AWS_REGION }}"
          encrypt = true
          assume_role = {
            role_arn = "${BACKEND_ROLE_ARN}"
          }
          EOF
            
            # Cleanup function to remove temporary backend config
            cleanup() {
              rm -f backend-ci.hcl
              echo "Backend configuration file cleaned up"
            }
            trap cleanup EXIT
            echo "::endgroup::"
            
            echo "::group::Terraform Init"
            terraform init -backend-config=backend-ci.hcl -input=false
            echo "Terraform initialization completed successfully"
            echo "::endgroup::"
          fi
          
          echo "::group::Terraform Validate"
          terraform validate
          echo "Terraform validation completed successfully"
          echo "::endgroup::"

  # Deploy to Dev (only on push to develop, not on PR)
  deploy-dev:
    name: Deploy to Dev
    needs: [build-frontend, build-lambda, validate-terraform-dev]
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    uses: ./.github/workflows/deploy-dev.yml
    with:
      action: apply
      seed_data: false
    secrets: inherit

  # Security scanning
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-results
          path: trivy-results.sarif

      - name: Run Checkov static analysis
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform/
          framework: terraform
          output_format: sarif
          output_file_path: checkov-results.sarif
          soft_fail: true

      - name: Upload Checkov scan results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: checkov-results
          path: checkov-results.sarif

  # Build Lambda packages
  build-lambda:
    name: Build Lambda Packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Lambda Packages
        uses: ./.github/actions/build-lambda
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Upload Lambda packages
        uses: actions/upload-artifact@v4
        with:
          name: lambda-packages
          path: lambda/packages/*.zip
          retention-days: 30

  # CI Failure Notification (main/develop only)
  notify-ci-failure:
    name: Notify CI Failure
    needs: [build-frontend, build-lambda, validate-terraform-dev, validate-terraform-prod, security]
    if: |
      always() &&
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop') &&
      (needs.build-frontend.result == 'failure' || 
       needs.build-lambda.result == 'failure' || 
       needs.validate-terraform-dev.result == 'failure' || 
       needs.validate-terraform-prod.result == 'failure' ||
       needs.security.result == 'failure')
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get Time and Duration
        id: time
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "time=$(TZ='Asia/Seoul' date '+%d일 %H시 %M분')" >> $GITHUB_OUTPUT
          
          START_TIME=$(gh run view ${{ github.run_id }} --json createdAt --jq '.createdAt')
          START_EPOCH=$(date -d "$START_TIME" +%s)
          NOW_EPOCH=$(date +%s)
          DURATION_SEC=$((NOW_EPOCH - START_EPOCH))
          DURATION_MIN=$((DURATION_SEC / 60))
          DURATION_SEC_REMAIN=$((DURATION_SEC % 60))
          echo "duration=${DURATION_MIN}분 ${DURATION_SEC_REMAIN}초" >> $GITHUB_OUTPUT

      - name: Determine Failure Details
        id: failure_details
        run: |
          # Determine which job failed
          if [ "${{ needs.build-frontend.result }}" == "failure" ]; then
            echo "stage=Frontend Build 실패" >> $GITHUB_OUTPUT
            echo "reason=프론트엔드 빌드 중 오류 발생" >> $GITHUB_OUTPUT
          elif [ "${{ needs.build-lambda.result }}" == "failure" ]; then
            echo "stage=Lambda Build 실패" >> $GITHUB_OUTPUT
            echo "reason=Lambda 패키지 빌드 중 오류 발생" >> $GITHUB_OUTPUT
          elif [ "${{ needs.validate-terraform-dev.result }}" == "failure" ]; then
            echo "stage=Terraform Validate (Dev) 실패" >> $GITHUB_OUTPUT
            echo "reason=Dev 환경 Terraform 검증 중 오류 발생" >> $GITHUB_OUTPUT
          elif [ "${{ needs.validate-terraform-prod.result }}" == "failure" ]; then
            echo "stage=Terraform Validate (Prod) 실패" >> $GITHUB_OUTPUT
            echo "reason=Prod 환경 Terraform 검증 중 오류 발생" >> $GITHUB_OUTPUT
          elif [ "${{ needs.security.result }}" == "failure" ]; then
            echo "stage=Security Scan 실패" >> $GITHUB_OUTPUT
            echo "reason=보안 스캔 중 취약점 발견" >> $GITHUB_OUTPUT
          else
            echo "stage=Unknown" >> $GITHUB_OUTPUT
            echo "reason=알 수 없는 오류" >> $GITHUB_OUTPUT
          fi

      - name: Notify Slack on CI Failure
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          channel: '#pokehabit-alerts'
          text: |
            🚨 *CI 빌드 실패!*
            
            브랜치: ${{ github.ref_name }}
            실패 단계: ${{ steps.failure_details.outputs.stage }}
            원인: ${{ steps.failure_details.outputs.reason }}
            
            🕒 시각: ${{ steps.time.outputs.time }}
            러너 소요 시간: ${{ steps.time.outputs.duration }}
            커밋터: @${{ github.actor }}
            
            <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|로그 확인하러 가기>
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_ALERT }}