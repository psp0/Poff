name: CI - Continuous Integration

on:
  push:
    branches: [main]
    paths-ignore:
      - '.github/dependabot.yml'
      - 'LICENSE'     
      - '**/*.md'     
      - 'docs/**'             
      - '.gitignore'     
  pull_request:
    branches: [main]
    paths-ignore:
      - '.github/dependabot.yml'
      - 'LICENSE'
      - '**/*.md'
      - 'docs/**'
      - '.gitignore'
  
permissions:
  contents: read
  id-token: write
  actions: read
  statuses: write
  deployments: write
  security-events: write
  pull-requests: read

env:
  NODE_VERSION: ${{ vars.NODE_VERSION }}
  TERRAFORM_VERSION: ${{ vars.TERRAFORM_VERSION }}
  AWS_REGION: ${{ vars.AWS_REGION }}
  TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect which files changed
  changes:
    name: Determine Changes
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      infra: ${{ steps.filter.outputs.infra }}
      shared: ${{ steps.filter.outputs.shared }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Paths Filter
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'public/**'
              - 'fonts/**'
              - 'poff-assets/**'
              - 'index.html'
              - 'index.css'
              - 'index.js'
              - 'vite.config.js'
              - 'pwa.js'
            backend:
              - 'lambda/**'
              - 'ecs-server/**'
            infra:
              - 'terraform/**'
            shared:
              - 'package*.json'
              - 'jest.config.cjs'
              - '.github/workflows/**'
              - 'scripts/**'

  # Security Scan (Reusable Workflow)
  call-security:
    name: Security Scan
    uses: ./.github/workflows/security.yml
    secrets: inherit

  # PR Checks: Unit Tests, Linting, Static Analysis
  pr-checks:
    name: Fast Checks (Test & Lint)
    needs: [changes]
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.backend == 'true' || needs.changes.outputs.shared == 'true'
    runs-on: ubuntu-latest
    outputs:
      failure_log: ${{ steps.capture-log.outputs.failure_log }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Linting
        run: npm run lint

      - name: Run Unit Tests with Coverage
        run: npm run test:ci 2>&1 | tee /tmp/test_output.log

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7
        if: always()

      - name: Coverage Summary
        if: always()
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            echo "## 📊 Coverage Summary" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Metric | Percentage |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|------------|" >> $GITHUB_STEP_SUMMARY
            LINES=$(jq -r '.total.lines.pct // 0' coverage/coverage-summary.json)
            BRANCHES=$(jq -r '.total.branches.pct // 0' coverage/coverage-summary.json)
            FUNCTIONS=$(jq -r '.total.functions.pct // 0' coverage/coverage-summary.json)
            STATEMENTS=$(jq -r '.total.statements.pct // 0' coverage/coverage-summary.json)
            echo "| Lines | ${LINES}% |" >> $GITHUB_STEP_SUMMARY
            echo "| Branches | ${BRANCHES}% |" >> $GITHUB_STEP_SUMMARY
            echo "| Functions | ${FUNCTIONS}% |" >> $GITHUB_STEP_SUMMARY
            echo "| Statements | ${STATEMENTS}% |" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Capture Failure Log
        id: capture-log
        if: failure()
        run: |
          echo "failure_log<<EOF" >> $GITHUB_OUTPUT
          if [ -f /tmp/test_output.log ]; then
            tail -n 20 /tmp/test_output.log >> $GITHUB_OUTPUT
          else
            echo "Log file not found" >> $GITHUB_OUTPUT
          fi
          echo "EOF" >> $GITHUB_OUTPUT

  # Build and validate frontend
  build-frontend:
    name: Build Frontend
    needs: [changes, pr-checks]
    if: |
      always() &&
      needs.changes.result == 'success' &&
      (needs.pr-checks.result == 'success' || needs.pr-checks.result == 'skipped')
    runs-on: ubuntu-latest
    outputs:
      failure_log: ${{ steps.capture-log.outputs.failure_log }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      # Case 1: frontend or shared changed -> Build from source
      - name: Setup Node.js
        if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.shared == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.shared == 'true'
        run: npm ci

      - name: Build frontend
        if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.shared == 'true'
        run: npm run build 2>&1 | tee /tmp/step_output.log

      # Case 2: No changes to frontend -> Download from main
      - name: Download Frontend Artifact from main
        id: download-fallback
        if: needs.changes.outputs.frontend != 'true' && needs.changes.outputs.shared != 'true'
        uses: dawidd6/action-download-artifact@v11
        continue-on-error: true
        with:
          workflow: ci.yml
          name: frontend-dist
          branch: main
          workflow_conclusion: success
          path: dist

      # Case 2.1: If download failed -> Build from source as fallback
      - name: Setup Node.js (Fallback)
        if: (needs.changes.outputs.frontend != 'true' && needs.changes.outputs.shared != 'true') && steps.download-fallback.outcome == 'failure'
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies (Fallback)
        if: (needs.changes.outputs.frontend != 'true' && needs.changes.outputs.shared != 'true') && steps.download-fallback.outcome == 'failure'
        run: npm ci

      - name: Build frontend (Fallback)
        if: (needs.changes.outputs.frontend != 'true' && needs.changes.outputs.shared != 'true') && steps.download-fallback.outcome == 'failure'
        run: npm run build 2>&1 | tee /tmp/step_output.log

      - name: Capture Failure Log
        id: capture-log
        if: failure()
        run: |
          echo "failure_log<<EOF" >> $GITHUB_OUTPUT
          if [ -f /tmp/step_output.log ]; then
            (grep -iC 5 "error" /tmp/step_output.log || tail -n 20 /tmp/step_output.log) | tail -n 20 >> $GITHUB_OUTPUT
          else
            echo "Log file not found" >> $GITHUB_OUTPUT
          fi
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Upload frontend build
        uses: actions/upload-artifact@v6
        with:
          name: frontend-dist
          path: dist/
          retention-days: 7

  # Validate Terraform configuration (Dev)
  validate-terraform-dev:
    name: Validate Terraform (Dev)
    needs: [changes]
    if: needs.changes.outputs.infra == 'true' || needs.changes.outputs.shared == 'true'
    runs-on: ubuntu-latest
    outputs:
      failure_log: ${{ steps.capture-log.outputs.failure_log }}
    env:
      TF_INFRA_WORKING_DIR: terraform/environments/preview-infra
      TF_APP_WORKING_DIR: terraform/environments/preview-app
      TF_INFRA_STATE_KEY: environments/preview-infra/terraform.tfstate
      TF_APP_STATE_KEY: environments/preview-app/terraform.tfstate
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Configure AWS Credentials
        if: github.actor != 'dependabot[bot]'
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_DEV_GHA_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-ci
          role-skip-session-tagging: true


      - name: Terraform Format Check
        run: |
          cd terraform
          terraform fmt -check -recursive modules/
          terraform fmt -check -recursive environments/preview-infra/
          terraform fmt -check -recursive environments/preview-app/
          terraform fmt -check -recursive bootstrap/

      - name: Terraform Init and Validate (Dev Infra)
        working-directory: ${{ env.TF_INFRA_WORKING_DIR }}
        env:
          TF_LOG: ERROR
          TF_IN_AUTOMATION: true
          BACKEND_ROLE_ARN: ${{ secrets.AWS_INFRA_CROSS_ACCOUNT_BACKEND_ROLE_ARN }}
        run: |
          if [ "${{ github.actor }}" == "dependabot[bot]" ]; then
            terraform init -backend=false -input=false
          else
            set -e
            cat > backend-ci.hcl <<EOF
          bucket  = "${{ env.TF_STATE_BUCKET }}"
          key     = "${{ env.TF_INFRA_STATE_KEY }}"
          region  = "${{ env.AWS_REGION }}"
          encrypt = true
          assume_role = {
            role_arn = "${BACKEND_ROLE_ARN}"
          }
          EOF
            cleanup() { rm -f backend-ci.hcl; }
            trap cleanup EXIT
            terraform init -backend-config=backend-ci.hcl -input=false 2>&1 | tee /tmp/step_output.log
          fi
          echo "::group::Terraform Validate (Dev Infra)"
          terraform validate 2>&1 | tee -a /tmp/step_output.log
          echo "::endgroup::"

      - name: Terraform Init and Validate (Dev App)
        working-directory: ${{ env.TF_APP_WORKING_DIR }}
        env:
          TF_LOG: ERROR
          TF_IN_AUTOMATION: true
          BACKEND_ROLE_ARN: ${{ secrets.AWS_INFRA_CROSS_ACCOUNT_BACKEND_ROLE_ARN }}
        run: |
          if [ "${{ github.actor }}" == "dependabot[bot]" ]; then
            terraform init -backend=false -input=false
          else
            set -e
            cat > backend-ci.hcl <<EOF
          bucket  = "${{ env.TF_STATE_BUCKET }}"
          key     = "${{ env.TF_APP_STATE_KEY }}"
          region  = "${{ env.AWS_REGION }}"
          encrypt = true
          assume_role = {
            role_arn = "${BACKEND_ROLE_ARN}"
          }
          EOF
            cleanup() { rm -f backend-ci.hcl; }
            trap cleanup EXIT
            terraform init -backend-config=backend-ci.hcl -input=false 2>&1 | tee /tmp/step_output.log
          fi
          echo "::group::Terraform Validate (Dev App)"
          terraform validate 2>&1 | tee -a /tmp/step_output.log
          echo "::endgroup::"

      - name: Capture Failure Log
        id: capture-log
        if: failure()
        run: |
          echo "failure_log<<EOF" >> $GITHUB_OUTPUT
          if [ -f /tmp/step_output.log ]; then
            (grep -iC 5 "error" /tmp/step_output.log || tail -n 20 /tmp/step_output.log) | tail -n 20 >> $GITHUB_OUTPUT
          else
            echo "Log file not found" >> $GITHUB_OUTPUT
          fi
          echo "EOF" >> $GITHUB_OUTPUT

  # Validate Terraform configuration (Prod)
  validate-terraform-prod:
    name: Validate Terraform (Prod)
    needs: [changes]
    if: needs.changes.outputs.infra == 'true' || needs.changes.outputs.shared == 'true'
    runs-on: ubuntu-latest
    outputs:
      failure_log: ${{ steps.capture-log.outputs.failure_log }}
    env:
      TF_WORKING_DIR: terraform/environments/prod
      TF_STATE_KEY: environments/prod/terraform.tfstate
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Configure AWS Credentials
        if: github.actor != 'dependabot[bot]'
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_PROD_GHA_CI_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-ci
          role-skip-session-tagging: true


      - name: Terraform Init and Validate (Prod)
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_LOG: ERROR
          TF_IN_AUTOMATION: true
          BACKEND_ROLE_ARN: ${{ secrets.AWS_INFRA_CROSS_ACCOUNT_BACKEND_ROLE_ARN }}
        run: |
          if [ "${{ github.actor }}" == "dependabot[bot]" ]; then
            echo "Running in Dependabot mode - skipping backend configuration"
            terraform init -backend=false -input=false
          else
            set -e
            echo "::group::Creating temporary backend configuration"
            cat > backend-ci.hcl <<EOF
          bucket  = "${{ env.TF_STATE_BUCKET }}"
          key     = "${{ env.TF_STATE_KEY }}"
          region  = "${{ env.AWS_REGION }}"
          encrypt = true
          assume_role = {
            role_arn = "${BACKEND_ROLE_ARN}"
          }
          EOF
            
            # Cleanup function to remove temporary backend config
            cleanup() {
              rm -f backend-ci.hcl
              echo "Backend configuration file cleaned up"
            }
            trap cleanup EXIT
            echo "::endgroup::"
            
            echo "::group::Terraform Init"
            terraform init -backend-config=backend-ci.hcl -input=false 2>&1 | tee /tmp/step_output.log
            echo "Terraform initialization completed successfully"
            echo "::endgroup::"
          fi
          
          echo "::group::Terraform Validate"
          terraform validate 2>&1 | tee -a /tmp/step_output.log
          echo "Terraform validation completed successfully"
          echo "::endgroup::"

      - name: Capture Failure Log
        id: capture-log
        if: failure()
        run: |
          echo "failure_log<<EOF" >> $GITHUB_OUTPUT
          if [ -f /tmp/step_output.log ]; then
            (grep -iC 5 "error" /tmp/step_output.log || tail -n 20 /tmp/step_output.log) | tail -n 20 >> $GITHUB_OUTPUT
          else
            echo "Log file not found" >> $GITHUB_OUTPUT
          fi
          echo "EOF" >> $GITHUB_OUTPUT

  # Check if preview-infra state exists in S3 (on PR to main)
  check-preview-infra:
    name: Check Dev Infra State
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.base_ref == 'main' && github.actor != 'dependabot[bot]'
    outputs:
      needed: ${{ steps.check.outputs.needed }}
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_DEV_GHA_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-infra-check
          role-skip-session-tagging: true

      - name: Assume execution role
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_DEV_EXECUTION_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-infra-check-exec
          role-chaining: true
          role-skip-session-tagging: true

      - name: Check if preview-infra tfstate exists
        id: check
        env:
          BACKEND_ROLE_ARN: ${{ secrets.AWS_INFRA_CROSS_ACCOUNT_BACKEND_ROLE_ARN }}
        run: |
          ASSUME_ROLE_OUTPUT=$(aws sts assume-role \
            --role-arn "${BACKEND_ROLE_ARN}" \
            --role-session-name "github-actions-s3-check" \
            --query "Credentials.[AccessKeyId,SecretAccessKey,SessionToken]" \
            --output text)
          S3_KEY_ID=$(echo "${ASSUME_ROLE_OUTPUT}" | awk '{print $1}')
          S3_SECRET_KEY=$(echo "${ASSUME_ROLE_OUTPUT}" | awk '{print $2}')
          S3_TOKEN=$(echo "${ASSUME_ROLE_OUTPUT}" | awk '{print $3}')

          AWS_ACCESS_KEY_ID="$S3_KEY_ID" AWS_SECRET_ACCESS_KEY="$S3_SECRET_KEY" AWS_SESSION_TOKEN="$S3_TOKEN" \
            aws s3api get-object --bucket "${{ env.TF_STATE_BUCKET }}" --key "environments/preview-infra/terraform.tfstate" /tmp/state.json > /dev/null 2>&1 || true

          if [ -f /tmp/state.json ] && [ -s /tmp/state.json ]; then
            RESOURCE_COUNT=$(jq '.resources | length' /tmp/state.json)
            if [ "$RESOURCE_COUNT" -gt 0 ]; then
              echo "✅ preview-infra state found and has resources ($RESOURCE_COUNT) — skipping infra deploy"
              echo "needed=false" >> $GITHUB_OUTPUT
            else
              echo "⚠️ preview-infra state found but is empty — will deploy infra first"
              echo "needed=true" >> $GITHUB_OUTPUT
            fi
          else
            echo "⚠️ preview-infra state not found — will deploy infra first"
            echo "needed=true" >> $GITHUB_OUTPUT
          fi

  # Deploy preview-infra only when it doesn't exist yet
  deploy-preview-infra-if-needed:
    name: Deploy Dev Infra (if needed)
    needs: [check-preview-infra]
    if: needs.check-preview-infra.outputs.needed == 'true'
    uses: ./.github/workflows/deploy-preview-infra.yml
    with:
      action: apply
    secrets: inherit

  # Deploy to Dev (on PR to main) — always runs after infra is guaranteed
  deploy-dev:
    name: Deploy to Dev
    needs: [build-frontend, build-lambda, validate-terraform-dev, call-security, check-preview-infra, deploy-preview-infra-if-needed]
    if: |
      always() &&
      github.event_name == 'pull_request' &&
      github.base_ref == 'main' &&
      github.actor != 'dependabot[bot]' &&
      (needs.build-frontend.result == 'success') &&
      (needs.build-lambda.result == 'success') &&
      (needs.validate-terraform-dev.result == 'success' || needs.validate-terraform-dev.result == 'skipped') &&
      (needs.call-security.result == 'success' || needs.call-security.result == 'skipped') &&
      (needs.deploy-preview-infra-if-needed.result == 'success' || needs.deploy-preview-infra-if-needed.result == 'skipped')
    uses: ./.github/workflows/deploy-preview-app.yml
    with:
      action: apply
      seed_data: true
      env_suffix: ${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || '' }}
    secrets: inherit



  # Build Lambda packages
  build-lambda:
    name: Build Lambda Packages
    needs: [changes, pr-checks]
    if: |
      always() &&
      needs.changes.result == 'success' &&
      (needs.pr-checks.result == 'success' || needs.pr-checks.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      # Case 1: backend or shared changed -> Build from source
      - name: Build Lambda Packages
        if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.shared == 'true'
        uses: ./.github/actions/build-lambda
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Case 2: No changes to backend -> Download from main
      - name: Download Lambda Artifact from main
        id: download-fallback
        if: needs.changes.outputs.backend != 'true' && needs.changes.outputs.shared != 'true'
        uses: dawidd6/action-download-artifact@v11
        continue-on-error: true
        with:
          workflow: ci.yml
          name: lambda-packages
          branch: main
          workflow_conclusion: success
          path: lambda/packages

      # Case 2.1: If download failed -> Build from source as fallback
      - name: Build Lambda Packages (Fallback)
        if: (needs.changes.outputs.backend != 'true' && needs.changes.outputs.shared != 'true') && steps.download-fallback.outcome == 'failure'
        uses: ./.github/actions/build-lambda
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Upload Lambda packages
        uses: actions/upload-artifact@v6
        with:
          name: lambda-packages
          path: lambda/packages/*.zip
          retention-days: 30

  # CI Failure Notification (main only)
  notify-ci-failure:
    name: Notify CI Failure
    needs: [changes, pr-checks, build-frontend, build-lambda, validate-terraform-dev, validate-terraform-prod, call-security]
    if: |
      always() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      (needs.changes.result == 'failure' ||
       needs.pr-checks.result == 'failure' ||
       needs.build-frontend.result == 'failure' || 
       needs.build-lambda.result == 'failure' || 
       needs.validate-terraform-dev.result == 'failure' || 
       needs.validate-terraform-prod.result == 'failure' ||
       needs.call-security.result == 'failure')
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    
    steps:
      - name: Get Time and Duration
        id: time
        run: |
          echo "time=$(TZ='Asia/Seoul' date '+%d일 %H시 %M분')" >> $GITHUB_OUTPUT
          
          START_TIME=$(gh run view ${{ github.run_id }} --json startedAt,createdAt --jq '.startedAt // .createdAt')
          START_EPOCH=$(date -d "$START_TIME" +%s)
          NOW_EPOCH=$(date +%s)
          DURATION_SEC=$((NOW_EPOCH - START_EPOCH))
          DURATION_MIN=$((DURATION_SEC / 60))
          DURATION_SEC_REMAIN=$((DURATION_SEC % 60))
          echo "duration=${DURATION_MIN}분 ${DURATION_SEC_REMAIN}초" >> $GITHUB_OUTPUT

      - name: Determine Failure Details
        id: failure_details
        run: |
          FAILED_JOB=""
          FAILED_STEP=""

          if [ "${{ needs.changes.result }}" == "failure" ]; then
            FAILED_JOB="Determine Changes"
            FAILED_STEP=$(gh run view ${{ github.run_id }} --json jobs --jq '.jobs[] | select(.name | contains("Determine Changes")) | .steps[] | select(.conclusion == "failure") | .name' | head -1)
          elif [ "${{ needs.pr-checks.result }}" == "failure" ]; then
            FAILED_JOB="Fast Checks (Test & Lint)"
            FAILED_STEP=$(gh run view ${{ github.run_id }} --json jobs --jq '.jobs[] | select(.name | contains("Fast Checks")) | .steps[] | select(.conclusion == "failure") | .name' | head -1)
          elif [ "${{ needs.build-frontend.result }}" == "failure" ]; then
            FAILED_JOB="Build Frontend"
            FAILED_STEP=$(gh run view ${{ github.run_id }} --json jobs --jq '.jobs[] | select(.name | contains("Build Frontend")) | .steps[] | select(.conclusion == "failure") | .name' | head -1)
          elif [ "${{ needs.build-lambda.result }}" == "failure" ]; then
            FAILED_JOB="Build Lambda"
            FAILED_STEP=$(gh run view ${{ github.run_id }} --json jobs --jq '.jobs[] | select(.name | contains("Build Lambda")) | .steps[] | select(.conclusion == "failure") | .name' | head -1)
          elif [ "${{ needs.validate-terraform-dev.result }}" == "failure" ]; then
            FAILED_JOB="Validate Terraform (Dev)"
            FAILED_STEP=$(gh run view ${{ github.run_id }} --json jobs --jq '.jobs[] | select(.name | contains("Validate Terraform (Dev)")) | .steps[] | select(.conclusion == "failure") | .name' | head -1)
          elif [ "${{ needs.validate-terraform-prod.result }}" == "failure" ]; then
            FAILED_JOB="Validate Terraform (Prod)"
            FAILED_STEP=$(gh run view ${{ github.run_id }} --json jobs --jq '.jobs[] | select(.name | contains("Validate Terraform (Prod)")) | .steps[] | select(.conclusion == "failure") | .name' | head -1)
          elif [ "${{ needs.call-security.result }}" == "failure" ]; then
            FAILED_JOB="Security Scan"
            FAILED_STEP="Check security scan logs"
          else
            FAILED_JOB="Unknown Job"
            FAILED_STEP="Unknown Step"
          fi
          
          echo "failed_job=$FAILED_JOB" >> $GITHUB_OUTPUT
          echo "failed_step=${FAILED_STEP:-알 수 없음}" >> $GITHUB_OUTPUT

          # Pick the failure log from the failed job
          if [ "${{ needs.pr-checks.result }}" == "failure" ]; then
            echo "log<<EOF" >> $GITHUB_OUTPUT
            echo "${{ needs.pr-checks.outputs.failure_log }}" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          elif [ "${{ needs.build-frontend.result }}" == "failure" ]; then
            echo "log<<EOF" >> $GITHUB_OUTPUT
            echo "${{ needs.build-frontend.outputs.failure_log }}" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          elif [ "${{ needs.validate-terraform-dev.result }}" == "failure" ]; then
            echo "log<<EOF" >> $GITHUB_OUTPUT
            echo "${{ needs.validate-terraform-dev.outputs.failure_log }}" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          elif [ "${{ needs.validate-terraform-prod.result }}" == "failure" ]; then
            echo "log<<EOF" >> $GITHUB_OUTPUT
            echo "${{ needs.validate-terraform-prod.outputs.failure_log }}" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "log=No detailed log available for this failure." >> $GITHUB_OUTPUT
          fi

      - name: Notify Slack on CI Failure
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          channel: '#poff-alerts'
          text: |
            🚨 *CI 빌드 실패!*
            
            브랜치: ${{ github.ref_name }}
            실패한 잡: ${{ steps.failure_details.outputs.failed_job }}
            실패한 스텝: ${{ steps.failure_details.outputs.failed_step }}
            
            🕒 시각: ${{ steps.time.outputs.time }}
            러너 소요 시간: ${{ steps.time.outputs.duration }}
            커밋터: @${{ github.actor }}
            
            *실패 로그 (마지막 20줄):*
            ```
            ${{ steps.failure_details.outputs.log }}
            ```
            
            <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|로그 확인하러 가기>
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_ALERT }}
  # Comment PR Preview URL
  comment-pr-preview:
    name: Comment PR Preview URL
    needs: [deploy-dev]
    if: always() && github.event_name == 'pull_request' && needs.deploy-dev.result == 'success' && needs.deploy-dev.outputs.website_url != '' && needs.deploy-dev.outputs.website_url != 'CloudFront not enabled'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const url = "${{ needs.deploy-dev.outputs.website_url }}";
            const api = "${{ needs.deploy-dev.outputs.api_endpoint }}";
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 **PR Preview Environment is Ready!**\n\n🌐 **Frontend URL:** ${url}\n🔌 **API Endpoint:** ${api}\n\n*Note: CORS is configured to allow wildcard (*) for PR preview environments.*`
            });
