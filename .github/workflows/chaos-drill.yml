name: Chaos Engineering Drill

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: 'Chaos scenario to run'
        required: true
        type: choice
        options:
          - lambda-failure
          - database-latency
          - api-gateway-throttle
      environment:
        description: 'Target environment (PROD REQUIRES APPROVAL)'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod
      duration:
        description: 'Duration in seconds'
        required: true
        default: '300'
        type: string
      
  schedule:
    # Run monthly chaos drill in dev - First Monday of month at 2 AM KST
    - cron: '0 17 1-7 * 1'

permissions:
  contents: read
  id-token: write
  issues: write

env:
  AWS_REGION: ${{ vars.AWS_REGION }}

jobs:
  # Manual approval for production
  approve-production:
    name: Approve Production Chaos Experiment
    runs-on: ubuntu-latest
    if: github.event.inputs.environment == 'prod' && github.event_name == 'workflow_dispatch'
    environment:
      name: production-chaos-approval
    steps:
      - name: Log approval
        run: |
          echo "Production chaos experiment approved"
          echo "Scenario: ${{ github.event.inputs.scenario }}"
          echo "Duration: ${{ github.event.inputs.duration }}s"

  # Pre-drill checks
  pre-drill-checks:
    name: Pre-Drill Safety Checks
    runs-on: ubuntu-latest
    needs: [approve-production]
    if: |
      always() && 
      (needs.approve-production.result == 'success' || 
       github.event.inputs.environment == 'dev' ||
       github.event_name == 'schedule')
    outputs:
      can_proceed: ${{ steps.checks.outputs.can_proceed }}
      scenario: ${{ steps.params.outputs.scenario }}
      environment: ${{ steps.params.outputs.environment }}
      duration: ${{ steps.params.outputs.duration }}
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set parameters
        id: params
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "scenario=lambda-failure" >> $GITHUB_OUTPUT
            echo "environment=dev" >> $GITHUB_OUTPUT
            echo "duration=180" >> $GITHUB_OUTPUT
          else
            echo "scenario=${{ github.event.inputs.scenario }}" >> $GITHUB_OUTPUT
            echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
            echo "duration=${{ github.event.inputs.duration }}" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ steps.params.outputs.environment == 'prod' && secrets.AWS_PROD_GHA_DEPLOY_ROLE_ARN || secrets.AWS_DEV_GHA_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: chaos-drill-checks

      - name: Safety checks
        id: checks
        run: |
          echo "Running pre-drill safety checks..."
          
          # Check if it's business hours for prod (avoid 9 AM - 6 PM KST)
          ENV="${{ steps.params.outputs.environment }}"
          if [ "$ENV" = "prod" ]; then
            HOUR=$(TZ='Asia/Seoul' date +%H)
            if [ $HOUR -ge 9 ] && [ $HOUR -lt 18 ]; then
              echo "❌ Cannot run production chaos during business hours (9 AM - 6 PM KST)"
              echo "Current time: $(TZ='Asia/Seoul' date)"
              echo "can_proceed=false" >> $GITHUB_OUTPUT
              exit 1
            fi
          fi
          
          # Check for ongoing incidents
          # In real scenario, check monitoring system or incident management tool
          
          echo "✅ All safety checks passed"
          echo "can_proceed=true" >> $GITHUB_OUTPUT

  # Run chaos experiment
  chaos-experiment:
    name: Execute Chaos Experiment
    runs-on: ubuntu-latest
    needs: [pre-drill-checks]
    if: needs.pre-drill-checks.outputs.can_proceed == 'true'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ needs.pre-drill-checks.outputs.environment == 'prod' && secrets.AWS_PROD_GHA_DEPLOY_ROLE_ARN || secrets.AWS_DEV_GHA_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: chaos-drill-execution

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq bc

      - name: Prepare scripts
        run: |
          cd chaos-engineering
          chmod +x scenarios/*.sh
          chmod +x scripts/*.sh
          mkdir -p results

      - name: Notify start
        if: needs.pre-drill-checks.outputs.environment == 'prod'
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          custom_payload: |
            {
              text: "🔬 *카오스 실험 시작*\n환경: ${{ needs.pre-drill-checks.outputs.environment }}\n시나리오: ${{ needs.pre-drill-checks.outputs.scenario }}\n지속 시간: ${{ needs.pre-drill-checks.outputs.duration }}초\n\n모니터링 대시보드를 확인하세요.",
              channel: '#pokehabit-alerts'
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_ALERT }}

      - name: Run Lambda Failure Scenario
        if: needs.pre-drill-checks.outputs.scenario == 'lambda-failure'
        working-directory: chaos-engineering
        run: |
          ./scenarios/lambda-failure.sh \
            ${{ needs.pre-drill-checks.outputs.environment }} \
            pokemon-management \
            ${{ needs.pre-drill-checks.outputs.duration }}

      - name: Run Database Latency Scenario
        if: needs.pre-drill-checks.outputs.scenario == 'database-latency'
        working-directory: chaos-engineering
        run: |
          ./scenarios/database-latency.sh \
            ${{ needs.pre-drill-checks.outputs.environment }} \
            500 \
            ${{ needs.pre-drill-checks.outputs.duration }}

      - name: Run API Gateway Throttle Scenario
        if: needs.pre-drill-checks.outputs.scenario == 'api-gateway-throttle'
        working-directory: chaos-engineering
        run: |
          ./scenarios/api-gateway-throttle.sh \
            ${{ needs.pre-drill-checks.outputs.environment }} \
            10 \
            20 \
            ${{ needs.pre-drill-checks.outputs.duration }}

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: chaos-drill-results-${{ needs.pre-drill-checks.outputs.scenario }}-${{ github.run_number }}
          path: chaos-engineering/results/
          retention-days: 90

      - name: Generate report
        if: always()
        id: report
        run: |
          cd chaos-engineering/results
          
          # Get the latest result file
          LATEST_RESULT=$(ls -t *.json 2>/dev/null | head -1)
          
          if [ -n "$LATEST_RESULT" ]; then
            echo "has_result=true" >> $GITHUB_OUTPUT
            
            # Parse result
            EXPERIMENT=$(jq -r '.experiment' "$LATEST_RESULT")
            STATUS=$(jq -r '.status' "$LATEST_RESULT")
            RECOVERY=$(jq -r '.recovery' "$LATEST_RESULT")
            
            echo "experiment=$EXPERIMENT" >> $GITHUB_OUTPUT
            echo "status=$STATUS" >> $GITHUB_OUTPUT
            echo "recovery=$RECOVERY" >> $GITHUB_OUTPUT
            
            # Create summary
            cat "$LATEST_RESULT" | jq '.'
          else
            echo "has_result=false" >> $GITHUB_OUTPUT
          fi

  # Post-drill analysis
  post-drill-analysis:
    name: Post-Drill Analysis
    runs-on: ubuntu-latest
    needs: [pre-drill-checks, chaos-experiment]
    if: always() && needs.chaos-experiment.result != 'skipped'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download results
        uses: actions/download-artifact@v6
        with:
          name: chaos-drill-results-${{ needs.pre-drill-checks.outputs.scenario }}-${{ github.run_number }}
          path: chaos-results/

      - name: Analyze metrics
        run: |
          echo "=== Chaos Drill Analysis ==="
          echo "Scenario: ${{ needs.pre-drill-checks.outputs.scenario }}"
          echo "Environment: ${{ needs.pre-drill-checks.outputs.environment }}"
          echo "Status: ${{ needs.chaos-experiment.result }}"
          
          # In real scenario, analyze CloudWatch metrics, error rates, etc.
          
          if [ -f chaos-results/*.json ]; then
            echo "Result details:"
            cat chaos-results/*.json | jq '.'
          fi

      - name: Create issue for findings
        if: needs.chaos-experiment.result == 'failure'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Chaos Drill] ${{ needs.pre-drill-checks.outputs.scenario }} - Issues Found`,
              body: `## Chaos Drill Failure Report
              
              **Scenario:** ${{ needs.pre-drill-checks.outputs.scenario }}
              **Environment:** ${{ needs.pre-drill-checks.outputs.environment }}
              **Date:** ${new Date().toISOString()}
              **Run:** [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
              
              ### Issues Detected
              
              The chaos experiment did not complete successfully. Please review:
              
              1. Check the [workflow logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
              2. Review CloudWatch metrics during the experiment
              3. Verify recovery procedures
              4. Update runbooks if needed
              
              ### Action Items
              
              - [ ] Investigate root cause
              - [ ] Update monitoring/alerting
              - [ ] Improve recovery procedures
              - [ ] Re-run experiment after fixes
              
              /cc @psp0`,
              labels: ['chaos-engineering', 'incident-response', 'high-priority']
            });

      - name: Notify completion
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ needs.chaos-experiment.result }}
          channel: ${{ needs.pre-drill-checks.outputs.environment == 'prod' && '#pokehabit-alerts' || '#pokehabit-devops' }}
          text: |
            🧪 *카오스 실험 완료*
            
            시나리오: ${{ needs.pre-drill-checks.outputs.scenario }}
            환경: ${{ needs.pre-drill-checks.outputs.environment }}
            결과: ${{ needs.chaos-experiment.result }}
            
            <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|상세 결과 보기>
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_DEVOPS }}

      - name: Update drill log
        run: |
          echo "Chaos drill completed and logged"
          # In real scenario, update a drill log database or spreadsheet
