name: Cleanup PR Environment

on:
  pull_request:
    types: [closed]

permissions:
  contents: read
  id-token: write
  actions: read
  statuses: write
  deployments: write
  pull-requests: read

jobs:
  destroy-dev-pr:
    name: Destroy Dev PR Resources
    uses: ./.github/workflows/deploy-preview-app.yml
    with:
      action: destroy
      env_suffix: pr-${{ github.event.pull_request.number }}
    secrets: inherit

  check-active-prs:
    name: Check Active PRs
    needs: destroy-dev-pr
    runs-on: ubuntu-latest
    outputs:
      open_pr_count: ${{ steps.check.outputs.count }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        
      - name: Count open pull requests (Excluding Bots)
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. --json author 를 추가해 작성자 정보를 가져옵니다.
          # 2. jq의 test() 함수를 이용해 대소문자 구분 없이 'bot'이 들어간 계정을 필터링(not)합니다.
          PR_COUNT=$(gh pr list -R "${{ github.repository }}" \
            --state open \
            --base main \
            --json author \
            --jq '[.[] | select(.author.login | test("bot"; "i") | not)] | length')
          
          echo "현재 열려있는 (봇 제외) 인간 개발자의 PR 개수: $PR_COUNT"
          echo "count=$PR_COUNT" >> $GITHUB_OUTPUT

  destroy-base-infra:
    name: Destroy Base Dev Infra
    needs: check-active-prs
    if: needs.check-active-prs.outputs.open_pr_count == '0'
    uses: ./.github/workflows/deploy-preview-infra.yml
    with:
      action: destroy
    secrets: inherit