name: 'Setup SSM Port Forwarding'
description: 'Establishes an SSM session to forward a local port to a remote RDS instance via a NAT instance'
inputs:
  nat-instance-id:
    description: 'The ID of the NAT instance to connect through'
    required: true
  rds-endpoint:
    description: 'The endpoint of the RDS instance'
    required: true
  rds-port:
    description: 'The port of the RDS instance'
    required: false
    default: '3306'
  local-port:
    description: 'The local port to forward to'
    required: false
    default: '3307'

runs:
  using: "composite"
  steps:
    - name: Validate NAT Instance
      shell: bash
      run: |
        if [ -z "${{ inputs.nat-instance-id }}" ]; then
          echo "❌ Error: NAT Instance ID is not provided"
          exit 1
        fi
        echo "✅ NAT Instance ID: ${{ inputs.nat-instance-id }}"

    - name: Install Session Manager Plugin
      shell: bash
      run: |
        curl -s "https://s3.amazonaws.com/session-manager-downloads/plugin/latest/ubuntu_64bit/session-manager-plugin.deb" -o "session-manager-plugin.deb"
        sudo dpkg -i session-manager-plugin.deb
        rm session-manager-plugin.deb

    - name: Start SSM Port Forwarding Session
      shell: bash
      run: |
        echo "Starting SSM session..."
        aws ssm start-session \
          --target "${{ inputs.nat-instance-id }}" \
          --document-name AWS-StartPortForwardingSessionToRemoteHost \
          --parameters '{"host":["${{ inputs.rds-endpoint }}"],"portNumber":["${{ inputs.rds-port }}"], "localPortNumber":["${{ inputs.local-port }}"]}' &
        
        echo "⏳ Waiting for tunnel to establish..."
        sleep 5
        echo "✅ SSM Port Forwarding started on localhost:${{ inputs.local-port }} -> ${{ inputs.rds-endpoint }}:${{ inputs.rds-port }}"
