name: 'Build Lambda Packages'
description: 'Builds and packages Lambda functions with shared dependencies'
inputs:
  node-version:
    description: 'Node.js version to use'
    required: true

runs:
  using: "composite"
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: 'npm'
        cache-dependency-path: lambda/shared/package-lock.json

    - name: Install shared dependencies
      shell: bash
      run: |
        echo "Installing shared dependencies..."
        cd lambda/shared
        npm ci --production

    - name: Build Lambda packages
      shell: bash
      run: |
        cd lambda
        
        # Create deployment packages for each function
        for dir in functions/*/; do
          if [ -d "$dir" ]; then
            function_name=$(basename "$dir")
            echo "Building $function_name..."
            
            # Create package directory
            mkdir -p "packages/$function_name"
            
            # Create directory structure to match source
            mkdir -p "packages/$function_name/functions/$function_name"
            mkdir -p "packages/$function_name/shared"
            
            # Copy function code
            cp -r "$dir"* "packages/$function_name/functions/$function_name/"
            
            # Copy shared code
            cp -r shared/*.js "packages/$function_name/shared/"
            
            # Copy shared node_modules to root node_modules
            # This allows require('module') to work from anywhere
            mkdir -p "packages/$function_name/node_modules"
            cp -r shared/node_modules/* "packages/$function_name/node_modules/" 2>/dev/null || true
            
            # Install function-specific dependencies
            if [ -f "$dir/package.json" ]; then
              echo "Installing function dependencies..."
              # Copy package.json to root to install dependencies in root node_modules
              cp "$dir/package.json" "packages/$function_name/"
              cd "packages/$function_name"
              npm install --production --no-save
              rm package.json
              cd ../..
            fi
            
            # Create ZIP package
            cd "packages/$function_name"
            zip -r "../${function_name}.zip" . \
              -x "*.test.js" "*.spec.js" "test/*" "tests/*" \
              -x "package-lock.json" "package.json"
            
            cd ../..
          fi
        done
        echo "✅ Lambda packages built successfully"
